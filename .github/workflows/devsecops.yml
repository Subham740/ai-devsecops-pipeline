name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bandit safety semgrep requests
          
      - name: Run SAST Scans
        run: python security/scanner.py
        continue-on-error: true
        
      - name: Run Dependency Scan
        run: safety check --json > safety_report.json || true
        
      - name: AI Remediation Guidance
        run: python security/ai_remediation.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true
          
      - name: Build Docker image
        run: docker build -t devsecops-app .
        
      - name: Container Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-app
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit_report.json
            semgrep_report.json
            safety_report.json
            remediation_report.md
