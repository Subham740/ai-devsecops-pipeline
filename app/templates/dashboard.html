<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - AI DevSecOps</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .table { color: #f8fafc; }
        .table-hover tbody tr:hover { background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">AI DevSecOps</a>
        <div class="navbar-nav ms-auto">
            <span class="nav-item nav-link">Welcome, {{ current_user.username }}</span>
            <a class="nav-item nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
        </div>
    </div>
</nav>
<div class="container">
    <h2 class="mb-4">Employee Directory</h2>
    <div class="card p-4 shadow">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Department</th>
                </tr>
            </thead>
            <tbody>
                {% for employee in employees %}
                <tr>
                    <td>{{ employee.id }}</td>
                    <td>{{ employee.name }}</td>
                    <td>{{ employee.role }}</td>
                    <td>{{ employee.department }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center">No employees found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
